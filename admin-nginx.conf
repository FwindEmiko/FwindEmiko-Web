server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host ;
        proxy_set_header X-Real-IP ;
        proxy_set_header X-Forwarded-For ;
    }

    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host ;
    }

    location / {
        try_files  / /index.html;
    }
}
