# ============================================================
# FwindEmiko-Web · 生产环境 Docker Compose
# 
# 端口规划:
#   4173 → 前端 (Nuxt SSR)
#   4174 → 后端 (FastAPI)
#   4175 → 管理后台 (Nginx SPA)
#   DB 复用现有 mariadb:10.11 容器（miragedge-network）
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fwe-backend
    restart: unless-stopped
    ports:
      - "4174:8000"
    env_file:
      - .env
    volumes:
      - fwe_uploads:/app/uploads
    networks:
      - fwe-prod
      - miragedge-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fwe-frontend
    restart: unless-stopped
    ports:
      - "4173:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=https://f.windemiko.top/api
      - NUXT_PUBLIC_SITE_URL=https://f.windemiko.top
    networks:
      - fwe-prod
    depends_on:
      - backend

  admin:
    image: nginx:alpine
    container_name: fwe-admin
    restart: unless-stopped
    ports:
      - "4175:80"
    volumes:
      - ./admin-spa/dist:/usr/share/nginx/html:ro
      - ./admin-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fwe-prod
    depends_on:
      - backend

volumes:
  fwe_uploads:

networks:
  fwe-prod:
    driver: bridge
  miragedge-network:
    external: true
