# ============================================================
# FwindEmiko-Web · 生产环境 Docker Compose
# 
# 端口规划:
#   4173 → 前端 (Nuxt SSR)
#   4174 → 后端 (FastAPI)
#   4175 → 管理后台 (Nginx SPA)
#   DB 不暴露宿主机端口，仅容器间通信
# ============================================================

services:
  db:
    image: mariadb:10.11
    container_name: fwe-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 
      MYSQL_DATABASE: windemiko
      MYSQL_USER: windemiko
      MYSQL_PASSWORD: 
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    volumes:
      - fwe_db:/var/lib/mysql
    networks:
      - fwe-prod
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fwe-backend
    restart: unless-stopped
    ports:
      - "4174:8000"
    env_file:
      - .env.prod
    volumes:
      - fwe_uploads:/app/uploads
    networks:
      - fwe-prod
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fwe-frontend
    restart: unless-stopped
    ports:
      - "4173:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=https://f.windemiko.top/api
      - NUXT_PUBLIC_SITE_URL=https://f.windemiko.top
    networks:
      - fwe-prod
    depends_on:
      - backend

  admin:
    image: nginx:alpine
    container_name: fwe-admin
    restart: unless-stopped
    ports:
      - "4175:80"
    volumes:
      - ./admin-spa/dist:/usr/share/nginx/html:ro
      - ./admin-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fwe-prod
    depends_on:
      - backend

volumes:
  fwe_db:
  fwe_uploads:

networks:
  fwe-prod:
    driver: bridge
