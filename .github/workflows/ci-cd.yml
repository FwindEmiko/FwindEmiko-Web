name: CI/CD

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  actions: read

env:
  NODE_VERSION: 22.x
  PNPM_VERSION: 10.15.0

jobs:
  # ============================================================
  # 代码质量检查
  # ============================================================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install
      - name: 类型检查
        run: pnpm run typecheck || echo '[WARN] typecheck not configured'
        continue-on-error: true
      - name: Lint
        run: pnpm run lint || echo '[WARN] lint not configured'
        continue-on-error: true

  # ============================================================
  # 构建测试 + 打包
  # ============================================================
  test:
    name: 构建测试
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install
      - name: 构建
        run: pnpm build
      - name: 检查构建产物大小
        run: |
          OUTPUT_SIZE=$(du -sh nuxt-app/.output | cut -f1)
          ADMIN_SIZE=$(du -sh admin-spa/dist | cut -f1)
          echo "📦 前端: $OUTPUT_SIZE, Admin: $ADMIN_SIZE"
          echo "## 构建产物大小: 前端 $OUTPUT_SIZE, Admin $ADMIN_SIZE" >> $GITHUB_STEP_SUMMARY

      - name: 打包
        if: github.event_name == 'push'
        run: |
          tar -czf fwe-deploy.tar.gz \
            nuxt-app/.output \
            admin-spa/dist \
            backend \
            packages \
            Dockerfile.backend \
            Dockerfile.frontend \
            admin-nginx.conf \
            .dockerignore \
            docker-compose.prod.yml \
            package.json \
            pnpm-workspace.yaml \
            pnpm-lock.yaml
          echo "📦 部署包大小: $(du -sh fwe-deploy.tar.gz | cut -f1)"

      - name: 上传构建产物
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: fwe-deploy
          path: fwe-deploy.tar.gz
          retention-days: 3

  # ============================================================
  # 部署
  # ============================================================
  deploy:
    name: 部署
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: fwe-deploy
          path: ./

      - name: 配置 SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 连接 WireGuard VPN
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq wireguard-tools
          echo "${{ secrets.WG_CLIENT_CONFIG }}" | sudo tee /etc/wireguard/github-actions.conf > /dev/null
          sudo wg-quick up github-actions
          sudo wg show

      - name: 远程部署
        run: |
          set -e
          mkdir -p ~/.ssh
          ssh-keyscan -H 20.20.20.1 >> ~/.ssh/known_hosts 2>/dev/null
          scp -o ConnectTimeout=60 fwe-deploy.tar.gz root@20.20.20.1:/tmp/
          ssh -o ConnectTimeout=60 root@20.20.20.1 << 'ENDSSH'
            set -e
            cd /opt/fwindemiko-web
            # 清理旧文件（保留 .env）
            find . -mindepth 1 -maxdepth 1 -not -name '.env' -exec rm -rf {} + 2>/dev/null || true
            tar -xzf /tmp/fwe-deploy.tar.gz
            rm /tmp/fwe-deploy.tar.gz
            docker-compose -f docker-compose.prod.yml up -d --build
            # admin 容器可能在 volume 挂载完成前就启动，导致 403；重启确保 dist 已就绪
            docker-compose -f docker-compose.prod.yml restart admin
            docker image prune -f
            echo "✅ 部署完成"
            docker-compose -f docker-compose.prod.yml ps
          ENDSSH

      - name: 断开 WireGuard VPN
        if: always()
        run: sudo wg-quick down github-actions 2>/dev/null || true
