name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm run typecheck || echo '[WARN] typecheck not configured'
      - name: Lint
        run: pnpm run lint || echo '[WARN] lint not configured'
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test || echo '[WARN] no tests yet'

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Setup WireGuard VPN
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq wireguard-tools
          echo "${{ secrets.WG_CLIENT_CONFIG }}" | sudo tee /etc/wireguard/github-actions.conf > /dev/null
          sudo wg-quick up github-actions
          sudo wg show
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/fwindemiko-web
            echo "=== Pulling latest code ==="
            git pull origin main
            echo "=== Building & starting containers ==="
            docker compose -f docker-compose.prod.yml up -d --build
            echo "=== Cleanup old images ==="
            docker image prune -f
            echo "=== Status ==="
            docker compose -f docker-compose.prod.yml ps
      - name: Teardown WireGuard
        if: always()
        run: sudo wg-quick down github-actions 2>/dev/null || true
